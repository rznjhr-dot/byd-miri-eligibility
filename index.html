<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Ridzuan BYD Miri | EV Eligibility Checker
</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

  <section class="hero">

    <img
      src="assets/byd-logo.png"
      class="logo"
      alt="BYD Logo">

    <h1>
      Cari EV Yang Sesuai Dengan Bajet Anda
    </h1>

    <p class="subtitle">
      oleh Ridzuan BYD Miri
    </p>

    <img
      src="assets/ridzuan.jpg"
      class="hero-image"
      alt="Ridzuan BYD Miri">

    <p class="hero-description">
      Dalam kurang 10 saat, ketahui model BYD yang paling sesuai dengan bajet dan keperluan anda.
    </p>

  </section>

  <section class="calculator-card">

    <label>
      Pendapatan Bersih Bulanan
    </label>

    <input
      type="number"
      id="income"
      placeholder="Contoh: 5000">

    <button id="checkBtn">
      Semak Kelayakan
    </button>

  </section>

  <section
    id="resultSection"
    class="hidden">
  </section>

</div>

<script src="js/models.js"></script>
<script src="js/app.js"></script>

</body>
</html>
