<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
EV Loan Calculator | Ridzuan BYD Miri
</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

  <section class="hero">

    <img
      src="assets/byd-logo.png"
      class="logo"
      alt="BYD Logo">

    <h1>
      Cari EV Yang Sesuai Dengan Bajet Anda
    </h1>

    <p class="subtitle">
      oleh Ridzuan BYD Miri
    </p>

    <img
      src="assets/ridzuan.jpg"
      class="hero-image"
      alt="Ridzuan BYD Miri">

    <p class="hero-description">
      Dalam kurang 10 saat, ketahui model BYD yang paling sesuai dengan bajet dan keperluan anda.
    </p>

  </section>

  <section class="calculator-card">

  <label>
    Pendapatan Bersih Bulanan
  </label>

  <div class="input-wrapper">

    <span class="input-prefix">
      RM
    </span>

    <input
      type="number"
      id="income"
      placeholder="5000">

  </div>

  <label class="secondary-label">
    Downpayment
  </label>

  <div class="input-wrapper">

    <span class="input-prefix">
      RM
    </span>

    <input
      type="number"
      id="downpayment"
      placeholder="0">

  </div>

  <div class="input-helper">

    ℹ️ Masukkan 0 untuk pinjaman penuh (full loan).

  </div>

  <label class="secondary-label">
  Tempoh Pembiayaan
</label>

<div class="tenure-selector">

  <button
    type="button"
    class="tenure-btn active"
    data-tenure="9">

    9 Tahun

  </button>

  <button
    type="button"
    class="tenure-btn"
    data-tenure="7">

    7 Tahun

  </button>

  <button
    type="button"
    class="tenure-btn"
    data-tenure="5">

    5 Tahun

  </button>

</div>

  <button id="checkBtn">
  Semak Kelayakan
</button>

<button
  id="resetBtn"
  class="reset-btn">

  ↺ Mulakan Semula

</button>

</section>

  <section
    id="resultSection"
    class="hidden">
  </section>

</div>

<script src="js/models.js"></script>
<script src="js/reasons.js"></script>
<script src="js/rebates.js"></script>
<script src="js/app.js"></script>

</body>
</html>
